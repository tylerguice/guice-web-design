<svg width="151" height="53" viewBox="0 0 151 53" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Guice Web Design</title>
  <desc id="logoDesc">Guice Web Design logo with three teal bars and a white Guice wordmark.</desc>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@800&amp;display=swap");
    .wordmark {
      font-family: "Manrope", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 800;
    }
  </style>

  <g transform="translate(0 4)">
    <rect x="0" y="0" width="2" height="47" fill="#159784"/>
    <rect x="6" y="0" width="5" height="47" fill="#2BD4BD"/>
    <rect x="15" y="0" width="8" height="47" fill="#65F1DF"/>
  </g>

  <g transform="translate(32 0)">
    <text class="wordmark" x="0" y="31" fill="#E9EFEF" font-size="33" letter-spacing="-1.155">Guice</text>
    <text class="wordmark" x="0" y="49" fill="#65F1DF" font-size="12" letter-spacing="4.08">WEB DESIGN</text>
  </g>
</svg>
